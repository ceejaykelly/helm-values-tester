name: Release Please

on:
  push:
    branches:
      - main
    path:
      - 'cmd/**'
      - 'pkg/**'

# Required for release-please to create PRs and push tags.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # config-file and manifest-file allow release-please to track
          # the current version baseline and avoid re-parsing old commits.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
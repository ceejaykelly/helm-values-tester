name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.2.3

# Required for the release job to upload assets to GitHub Releases.
permissions:
  contents: write

jobs:
  build:
    name: Build and Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${GOOS}" = "windows" ]; then EXT=".exe"; fi
          OUT=dist/ya-${GOOS}-${GOARCH}${EXT}
          go build -o $OUT ./cmd/ya

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ya-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/ya-*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/ya-*